<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✏️ 文悦阁 - 精品文具商城</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">✏️ 文悦阁</div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 搜索文具好物...">
      </div>
      <button class="cart-btn" id="cartBtn">
        🛒 购物车 <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main class="main">
    <!-- Banner -->
    <div class="banner">
      <div class="banner-left">
        <div class="banner-title">✏️ 开学季特惠</div>
        <div class="banner-sub">精选品质文具 · 全场满39包邮 · 学习好帮手</div>
        <div class="banner-tags">
          <span class="b-tag">爆款</span>
          <span class="b-tag">新品</span>
          <span class="b-tag">特价</span>
        </div>
      </div>
      <div class="banner-emoji">✏️📎📏✂️📐</div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-scroll">
        <div class="filter-item active" data-cat="all">全部</div>
        <div class="filter-item" data-cat="笔类">🖊️ 笔类</div>
        <div class="filter-item" data-cat="纸张类">📄 纸张类</div>
        <div class="filter-item" data-cat="收纳类">📁 收纳类</div>
        <div class="filter-item" data-cat="办公工具">🛠️ 办公工具</div>
      </div>
      <div class="filter-sort">
        <select id="sortSelect">
          <option value="default">默认排序</option>
          <option value="price-asc">价格 ↑</option>
          <option value="price-desc">价格 ↓</option>
          <option value="sales">销量优先</option>
        </select>
      </div>
    </div>

    <!-- Grid -->
    <div class="products-grid" id="productsGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">✏️</div>
      <p>没有找到相关文具</p>
    </div>
  </main>

  <!-- Cart Sidebar -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>🛒 购物车</h2>
      <button class="cart-close" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-empty" id="cartEmpty" style="display:none;">
      <div class="empty-icon">🛒</div>
      <p>购物车是空的</p>
    </div>
    <div class="cart-footer" id="cartFooter">
      <div class="cart-total">
        <span>合计：</span>
        <span class="total-price" id="totalPrice">¥0.00</span>
      </div>
      <button class="btn-checkout" id="btnCheckout">去结算</button>
      <button class="btn-clear" id="btnClearCart">清空购物车</button>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="detailTitle">文具详情</h2>
        <button class="modal-close" id="detailClose">✕</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="checkoutOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>📦 确认订单</h2>
        <button class="modal-close" id="checkoutClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="checkout-summary" id="checkoutSummary"></div>
        <form id="checkoutForm" novalidate>
          <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="coName" placeholder="请输入收货人姓名" required>
            <div class="form-error">请输入收货人姓名</div>
          </div>
          <div class="form-group">
            <label>手机号 *</label>
            <input type="tel" id="coPhone" placeholder="请输入11位手机号码" maxlength="11" required>
            <div class="form-error">请输入正确的11位手机号</div>
          </div>
          <div class="form-group">
            <label>收货地址 *</label>
            <textarea id="coAddress" rows="2" placeholder="请输入详细收货地址（至少5个字）" required></textarea>
            <div class="form-error">请输入详细收货地址</div>
          </div>
          <div class="form-group">
            <label>备注</label>
            <input type="text" id="coNote" placeholder="选填">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="coCancel">取消</button>
        <button class="btn-submit" id="coSubmit">提交订单</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastMsg"></span></div>

  <footer class="footer"><p>✏️ 文悦阁 — 精品文具，学习办公好帮手 © 2026</p></footer>
  <script src="js/app.js"></script>
</body>
</html>
